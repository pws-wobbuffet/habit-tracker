<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Habitus" />
    <meta name="format-detection" content="telephone=no" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <link rel="icon" type="image/png" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-180.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="/icons/apple-167.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/apple-152.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <title>Habitus</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      document.addEventListener(
        'touchmove',
        function (e) {
          if (e.touches.length > 1) e.preventDefault()
        },
        { passive: false },
      )
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
